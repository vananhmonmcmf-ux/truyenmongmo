<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TruyenMongMo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

/* HEADER */
header {
  background: #ff6600;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* MENU */
nav {
  display: flex;
  justify-content: space-around;
  background: #1e1e1e;
  padding: 10px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* SEARCH */
.search {
  padding: 10px;
  text-align: center;
}

.search input {
  width: 80%;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

/* BANNER */
.banner {
  background: url('https://picsum.photos/800/200') no-repeat center;
  background-size: cover;
  height: 150px;
}

/* GRID */
.container {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #1e1e1e;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 14px;
  padding: 10px;
}

/* READER */
.reader {
  display: none;
  padding: 20px;
}

.reader img {
  width: 100%;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  padding: 10px;
  background: orange;
  border: none;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>📚 TruyenMongMo</header>

<nav>
  <a href="#">Trang chủ</a>
  <a href="#">Thể loại</a>
  <a href="#">Xếp hạng</a>
  <a href="#">Theo dõi</a>
</nav>

<div class="banner"></div>

<div class="search">
  <input type="text" placeholder="Tìm truyện...">
</div>

<div class="container" id="home">
  <div class="grid">

    <div class="card" onclick="openStory('Solo Leveling')">
      <img src="https://picsum.photos/200/300?1">
      <h3>Solo Leveling</h3>
    </div>

    <div class="card" onclick="openStory('One Piece')">
      <img src="https://picsum.photos/200/300?2">
      <h3>One Piece</h3>
    </div>

    <div class="card" onclick="openStory('Jujutsu Kaisen')">
      <img src="https://picsum.photos/200/300?3">
      <h3>Jujutsu Kaisen</h3>
    </div>

    <div class="card" onclick="openStory('Demon Slayer')">
      <img src="https://picsum.photos/200/300?4">
      <h3>Demon Slayer</h3>
    </div>

  </div>
</div>

<div class="reader" id="reader">
  <button onclick="goHome()">⬅ Quay lại</button>
  <h2 id="storyTitle"></h2>

  <img src="https://picsum.photos/400/600?5">
  <img src="https://picsum.photos/400/600?6">
  <img src="https://picsum.photos/400/600?7">
</div>

<script>
function openStory(name) {
  document.getElementById("home").style.display = "none";
  document.getElementById("reader").style.display = "block";
  document.getElementById("storyTitle").innerText = name;
}

function goHome() {
  document.getElementById("home").style.display = "block";
  document.getElementById("reader").style.display = "none";
}
</script>

</body>
</html>
